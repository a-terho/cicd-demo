events { }

http {
  server {
    listen 80;

    location / {      
      proxy_pass http://frontend:80;
    }

    location /api/ {
      proxy_pass http://backend:3003;
    }

    location /health {
      proxy_pass http://backend:3003;
    }

    location /version {
      proxy_pass http://backend:3003;
    }
  }
}